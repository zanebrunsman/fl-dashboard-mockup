type: horizontal-stack
cards:
  - type: custom:mushroom-template-card
    primary: Audible alert
    secondary: '{{ states(''input_number.lightning_audible_radius_mi'') | int }} mi · {{ ''ON'' if is_state(''input_boolean.lightning_audible_ring_enabled'',''on'') else ''OFF'' }}'
    icon: mdi:volume-high
    icon_color: |-
      {% if is_state('input_boolean.lightning_audible_ring_enabled','on') %}amber{% else %}grey{% endif %}
    tap_action:
      action: navigate
      navigation_path: /lovelace-fl/settings
  - type: custom:mushroom-template-card
    primary: Visual alert
    secondary: '{{ states(''input_number.lightning_visual_radius_mi'') | int }} mi · {{ ''ON'' if is_state(''input_boolean.lightning_visual_ring_enabled'',''on'') else ''OFF'' }}'
    icon: mdi:eye-outline
    icon_color: |-
      {% if is_state('input_boolean.lightning_visual_ring_enabled','on') %}blue{% else %}grey{% endif %}
    tap_action:
      action: navigate
      navigation_path: /lovelace-fl/settings
