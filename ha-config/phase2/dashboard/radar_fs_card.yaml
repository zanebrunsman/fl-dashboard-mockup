# why: Iframe srcdoc keeps the radar HTML inline in YAML (no filesystem dep).
# This sidesteps Docker bind-mount issues with the SSH add-on /config/www/ path.
# A bridge script syncs HA state (lightning strikes, ring radii, theme) into the
# iframe via postMessage every 5s.
type: custom:html-template-card
ignore_line_breaks: true
content: |
  <div style="position:relative;width:100%;height:calc(100vh - 56px);border-radius:14px;overflow:hidden;background:#0b1929;">
    <iframe id="radar-iframe-fs" srcdoc="<!DOCTYPE html>&#10;<html lang=&quot;en&quot;>&#10;<head>&#10;<meta charset=&quot;utf-8&quot; />&#10;<meta name=&quot;viewport&quot; content=&quot;width=device-width,initial-scale=1&quot; />&#10;<title>Radar</title>&#10;<link rel=&quot;stylesheet&quot; href=&quot;https://unpkg.com/leaflet@1.9.4/dist/leaflet.css&quot; />&#10;<script src=&quot;https://unpkg.com/leaflet@1.9.4/dist/leaflet.js&quot;></script>&#10;<style>&#10;  html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:system-ui,sans-serif; background:#0b1929; }&#10;  #map { width:100vw; height:100vh; }&#10;  .rv-pill { background:rgba(0,0,0,0.7); color:#fff; font-size:11px; padding:5px 9px; border-radius:999px; line-height:1; white-space:nowrap; }&#10;  .rv-pill--lightning { background:rgba(255,216,77,0.92); color:#1c2a35; font-weight:600; }&#10;  .rv-pill--err { background:#b42318; display:none; }&#10;  .rv-btn { display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px; border:none; border-radius:8px; background:rgba(0,0,0,0.7); color:#fff; cursor:pointer; text-decoration:none; }&#10;  .rv-btn:hover { background:rgba(0,0,0,0.9); }&#10;  .rv-cluster { display:flex; align-items:center; gap:6px; }&#10;  .rv-legend { display:flex; flex-wrap:wrap; gap:8px; font-size:11px; color:#fff; background:rgba(0,0,0,0.7); padding:6px 10px; border-radius:8px; }&#10;  .rv-legend span { display:flex; align-items:center; gap:4px; }&#10;  .rv-legend i { width:10px; height:10px; display:inline-block; }&#10;  #rv-progress-track { position:absolute; bottom:0; left:0; right:0; height:3px; background:rgba(255,255,255,0.18); pointer-events:none; z-index:1500; }&#10;  #rv-progress-bar { height:100%; width:0%; background:#ffd84d; transition:width 0.18s linear; }&#10;  .home-pin div { box-shadow:0 0 0 2px #ef4444; }&#10;</style>&#10;</head>&#10;<body>&#10;<div id=&quot;map&quot;></div>&#10;<div id=&quot;rv-progress-track&quot;><div id=&quot;rv-progress-bar&quot;></div></div>&#10;<script>&#10;window.__radarMode='fs';&#10;(function(){&#10;  // ===== Read query params: theme, embed flag =====&#10;  var qp = new URLSearchParams(window.__radarMode === 'embed' ? '?embed=1' : '');&#10;  var embed = qp.get('embed') === '1';&#10;  var theme = qp.get('theme') || 'light';&#10;  var miAud = parseFloat(qp.get('aud') || '12');&#10;  var miVis = parseFloat(qp.get('vis') || '30');&#10;  var audOn = qp.get('audOn') !== '0';&#10;  var visOn = qp.get('visOn') !== '0';&#10;  var HOME = [29.9, -81.31];&#10;  var HOME_ZOOM = embed ? 9 : 8;&#10;  var FRAMES_BACK = embed ? 6 : 24;&#10;  var FRAME_MS = embed ? 220 : 280;&#10;  var radarFrameTs = null, lastStrikeTs = null, paused = false, speed = 1;&#10;&#10;  var basemapUrls = {&#10;    light: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',&#10;    dark:  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'&#10;  };&#10;&#10;  var fmtAge = function(tsSec) {&#10;    if (!tsSec) return '--';&#10;    var diff = Math.max(0, Math.floor(Date.now()/1000 - tsSec));&#10;    if (diff < 60) return diff + 's ago';&#10;    if (diff < 3600) return Math.floor(diff/60) + 'm ago';&#10;    return Math.floor(diff/3600) + 'h ago';&#10;  };&#10;&#10;  var map = L.map('map', { zoomControl: true, attributionControl: false }).setView(HOME, HOME_ZOOM);&#10;  var baseLayer = L.tileLayer(basemapUrls[theme], { maxZoom: 18, subdomains: 'abcd' }).addTo(map);&#10;  L.control.attribution({ position: 'bottomright', prefix: false }).addAttribution('© OSM © CARTO | RainViewer').addTo(map);&#10;&#10;  var ageRadarSpan, ageLightningSpan, errPill;&#10;  var TopBar = L.Control.extend({&#10;    options: { position: 'topright' },&#10;    onAdd: function() {&#10;      var d = L.DomUtil.create('div', 'rv-cluster');&#10;      L.DomEvent.disableClickPropagation(d);&#10;      ageRadarSpan = L.DomUtil.create('span', 'rv-pill', d);&#10;      ageRadarSpan.innerHTML = 'Radar · <span id=&quot;rv-radar-age&quot;>--</span>';&#10;      ageLightningSpan = L.DomUtil.create('span', 'rv-pill rv-pill--lightning', d);&#10;      ageLightningSpan.innerHTML = 'Lightning · <span id=&quot;rv-lightning-age&quot;>--</span>';&#10;      errPill = L.DomUtil.create('span', 'rv-pill rv-pill--err', d);&#10;      errPill.textContent = 'Radar offline';&#10;      var resetBtn = L.DomUtil.create('button', 'rv-btn', d);&#10;      resetBtn.type = 'button'; resetBtn.title = 'Reset view';&#10;      resetBtn.innerHTML = '<svg viewBox=&quot;0 0 24 24&quot; width=&quot;16&quot; height=&quot;16&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;8&quot;/><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;2&quot; fill=&quot;currentColor&quot;/></svg>';&#10;      L.DomEvent.on(resetBtn, 'click', function(e){ L.DomEvent.stop(e); map.setView(HOME, HOME_ZOOM); });&#10;      if (embed) {&#10;        var expandBtn = L.DomUtil.create('a', 'rv-btn', d);&#10;        expandBtn.href = '../lovelace-fl/radar-fs';&#10;        expandBtn.target = '_top';&#10;        expandBtn.title = 'Full screen';&#10;        expandBtn.innerHTML = '<svg viewBox=&quot;0 0 24 24&quot; width=&quot;16&quot; height=&quot;16&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5&quot;/></svg>';&#10;      }&#10;      return d;&#10;    }&#10;  });&#10;  new TopBar().addTo(map);&#10;&#10;  var Legend = L.Control.extend({&#10;    options: { position: 'bottomleft' },&#10;    onAdd: function() {&#10;      var d = L.DomUtil.create('div', 'rv-legend');&#10;      d.innerHTML =&#10;        '<span><i style=&quot;background:#22c55e;border-radius:2px;&quot;></i>Light</span>' +&#10;        '<span><i style=&quot;background:#f59e0b;border-radius:2px;&quot;></i>Mod</span>' +&#10;        '<span><i style=&quot;background:#ef4444;border-radius:2px;&quot;></i>Heavy</span>' +&#10;        '<span><i style=&quot;background:#ffd84d;border-radius:50%;&quot;></i>⚡&amp;lt;10m</span>';&#10;      return d;&#10;    }&#10;  });&#10;  new Legend().addTo(map);&#10;&#10;  var updateAges = function() {&#10;    var ra = document.getElementById('rv-radar-age');&#10;    var la = document.getElementById('rv-lightning-age');&#10;    if (ra) ra.textContent = fmtAge(radarFrameTs);&#10;    if (la) la.textContent = lastStrikeTs ? fmtAge(lastStrikeTs) : 'none';&#10;  };&#10;&#10;  var frames = [], currentIdx = 0, animTimer = null;&#10;&#10;  var loadFrames = function() {&#10;    fetch('https://api.rainviewer.com/public/weather-maps.json').then(function(r){return r.json();}).then(function(j){&#10;      var past = (j.radar &amp;&amp; j.radar.past) || [];&#10;      if (!past.length) { if (errPill) errPill.style.display = 'inline-block'; return; }&#10;      if (errPill) errPill.style.display = 'none';&#10;      var slice = past.slice(-FRAMES_BACK);&#10;      frames.forEach(function(f){ if (f.layer &amp;&amp; map.hasLayer(f.layer)) map.removeLayer(f.layer); });&#10;      frames = [];&#10;      slice.forEach(function(f) {&#10;        var url = j.host + f.path + '/512/{z}/{x}/{y}/2/1_1.png';&#10;        var layer = L.tileLayer(url, { opacity: 0, maxZoom: 18, zIndex: 200 }).addTo(map);&#10;        frames.push({ ts: f.time, layer: layer });&#10;      });&#10;      currentIdx = frames.length - 1;&#10;      showFrame(currentIdx);&#10;      if (!animTimer) startAnimation();&#10;    }).catch(function(){ if (errPill) errPill.style.display = 'inline-block'; });&#10;  };&#10;&#10;  var showFrame = function(idx) {&#10;    if (!frames.length) return;&#10;    frames.forEach(function(f, i){ f.layer.setOpacity(i === idx ? 0.55 : 0); });&#10;    radarFrameTs = frames[idx].ts;&#10;    updateAges();&#10;    var pb = document.getElementById('rv-progress-bar');&#10;    if (pb) pb.style.width = ((idx + 1) / frames.length * 100) + '%';&#10;  };&#10;&#10;  var startAnimation = function() {&#10;    animTimer = setInterval(function() {&#10;      if (paused || !frames.length) return;&#10;      currentIdx = (currentIdx + 1) % frames.length;&#10;      showFrame(currentIdx);&#10;    }, FRAME_MS);&#10;  };&#10;&#10;  document.body.addEventListener('mouseenter', function(){ paused = true; });&#10;  document.body.addEventListener('mouseleave', function(){ paused = false; });&#10;&#10;  loadFrames();&#10;  setInterval(loadFrames, 5 * 60 * 1000);&#10;&#10;  // Home pin&#10;  var homeIcon = L.divIcon({ className:'home-pin', html:'<div style=&quot;width:14px;height:14px;border-radius:50%;background:#ef4444;border:3px solid #fff;&quot;></div>', iconSize:[14,14] });&#10;  L.marker(HOME, { icon: homeIcon, zIndexOffset: 1000 }).addTo(map);&#10;&#10;  // Range rings&#10;  var miToM = function(mi){ return mi * 1609.34; };&#10;  var audibleRing = L.circle(HOME, { radius: miToM(miAud), color:'#ffd84d', weight:2, fill:false, dashArray:'6,6' });&#10;  var visualRing  = L.circle(HOME, { radius: miToM(miVis), color:'#fbbf24', weight:1.5, fill:false, dashArray:'4,8', opacity:0.7 });&#10;  if (audOn) audibleRing.addTo(map);&#10;  if (visOn) visualRing.addTo(map);&#10;&#10;  // Lightning strikes — read from parent window (HA) via postMessage&#10;  var strikeLayer = L.layerGroup().addTo(map);&#10;  var renderStrikes = function(strikes) {&#10;    strikeLayer.clearLayers();&#10;    if (!Array.isArray(strikes)) return;&#10;    var now = Date.now(), newest = 0;&#10;    strikes.forEach(function(s){&#10;      if (s.lat == null || s.lon == null) return;&#10;      var pubMs = s.t ? new Date(s.t).getTime() : now;&#10;      var ageMin = (now - pubMs) / 60000;&#10;      if (ageMin > 60) return;&#10;      if (pubMs > newest) newest = pubMs;&#10;      var opacity = Math.max(0.15, 1 - ageMin / 60);&#10;      var size = ageMin < 2 ? 9 : (ageMin < 10 ? 6 : 4);&#10;      L.circleMarker([s.lat, s.lon], { radius: size, color:'#fff', weight: 1, fillColor:'#ffd84d', fillOpacity: opacity }).addTo(strikeLayer);&#10;    });&#10;    lastStrikeTs = newest ? Math.floor(newest/1000) : null;&#10;    updateAges();&#10;  };&#10;&#10;  // Listen for strikes + setting updates from HA dashboard&#10;  window.addEventListener('message', function(ev){&#10;    if (!ev.data || ev.data.type !== 'radar-update') return;&#10;    if (ev.data.strikes) renderStrikes(ev.data.strikes);&#10;    if (typeof ev.data.aud === 'number') audibleRing.setRadius(miToM(ev.data.aud));&#10;    if (typeof ev.data.vis === 'number') visualRing.setRadius(miToM(ev.data.vis));&#10;    if (typeof ev.data.audOn === 'boolean') {&#10;      if (ev.data.audOn &amp;&amp; !map.hasLayer(audibleRing)) audibleRing.addTo(map);&#10;      if (!ev.data.audOn &amp;&amp; map.hasLayer(audibleRing)) map.removeLayer(audibleRing);&#10;    }&#10;    if (typeof ev.data.visOn === 'boolean') {&#10;      if (ev.data.visOn &amp;&amp; !map.hasLayer(visualRing)) visualRing.addTo(map);&#10;      if (!ev.data.visOn &amp;&amp; map.hasLayer(visualRing)) map.removeLayer(visualRing);&#10;    }&#10;    if (ev.data.theme &amp;&amp; basemapUrls[ev.data.theme]) {&#10;      if (baseLayer) map.removeLayer(baseLayer);&#10;      baseLayer = L.tileLayer(basemapUrls[ev.data.theme], { maxZoom: 18, subdomains: 'abcd' }).addTo(map);&#10;      baseLayer.bringToBack();&#10;    }&#10;  });&#10;&#10;  // Tell parent we're ready&#10;  try { window.parent.postMessage({type:'radar-ready'}, '*'); } catch(e){}&#10;&#10;  setInterval(updateAges, 30000);&#10;})();&#10;</script>&#10;</body>&#10;</html>&#10;" style="border:0;width:100%;height:100%;display:block;" sandbox="allow-scripts allow-same-origin allow-top-navigation-by-user-activation"></iframe>
  </div>
  <script>
    (function(){
      if (window.__radarBridge_radar_iframe_fs) return;
      window.__radarBridge_radar_iframe_fs = true;
      var pickIframe = function(){ return document.getElementById('radar-iframe-fs'); };
      var send = function(){
        var ifr = pickIframe(); if (!ifr || !ifr.contentWindow) return;
        var hass = document.querySelector('home-assistant') && document.querySelector('home-assistant').hass;
        if (!hass) return;
        var strikes = [];
        Object.keys(hass.states).forEach(function(eid){
          if (!eid.startsWith('geo_location.lightning_strike_')) return;
          var s = hass.states[eid];
          strikes.push({ lat: s.attributes.latitude, lon: s.attributes.longitude, t: s.attributes.publication_date });
        });
        var aud = hass.states['input_number.lightning_audible_radius_mi'];
        var vis = hass.states['input_number.lightning_visual_radius_mi'];
        var audEn = hass.states['input_boolean.lightning_audible_ring_enabled'];
        var visEn = hass.states['input_boolean.lightning_visual_ring_enabled'];
        var bg = getComputedStyle(document.documentElement).getPropertyValue('--primary-background-color').trim();
        var m = bg.match(/#([0-9a-f]{6})/i);
        var theme = 'light';
        if (m) {
          var r = parseInt(m[1].substr(0,2),16), g = parseInt(m[1].substr(2,2),16), b = parseInt(m[1].substr(4,2),16);
          theme = (r*0.299+g*0.587+b*0.114) < 128 ? 'dark' : 'light';
        }
        ifr.contentWindow.postMessage({
          type: 'radar-update', strikes: strikes,
          aud: aud ? parseFloat(aud.state) : undefined,
          vis: vis ? parseFloat(vis.state) : undefined,
          audOn: audEn ? audEn.state === 'on' : undefined,
          visOn: visEn ? visEn.state === 'on' : undefined,
          theme: theme
        }, '*');
      };
      window.addEventListener('message', function(ev){
        if (ev.data && ev.data.type === 'radar-ready') send();
      });
      setInterval(send, 5000);
      setTimeout(send, 1500);
    })();
  </script>
