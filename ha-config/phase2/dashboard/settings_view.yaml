# Settings tab — Phase 2.6.2
# Theme buttons now call browser_mod.set_theme DIRECTLY (not via input_select),
# so the action fires from the iPad's browser context. browser_id: THIS targets
# this device only, and dark: dark/light/auto forces the mode regardless of
# per-user theme or system Light/Dark.

title: Settings
path: settings
icon: mdi:cog
type: sections
max_columns: 2
subview: false
sections:
  - type: grid
    column_span: 1
    cards:
      - type: markdown
        title: Theme
        content: |
          Tap a button to change THIS iPad's theme. Setting persists across reloads.

      - type: horizontal-stack
        cards:
          - type: button
            name: Light
            icon: mdi:white-balance-sunny
            tap_action:
              action: call-service
              service: browser_mod.set_theme
              service_data:
                theme: Casa Cola Creek Light
                dark: light
                browser_id: THIS
          - type: button
            name: Dark
            icon: mdi:weather-night
            tap_action:
              action: call-service
              service: browser_mod.set_theme
              service_data:
                theme: Casa Cola Creek Dark
                dark: dark
                browser_id: THIS
          - type: button
            name: Auto
            icon: mdi:theme-light-dark
            tap_action:
              action: call-service
              service: browser_mod.set_theme
              service_data:
                theme: Casa Cola Creek Light
                dark: auto
                browser_id: THIS

      - type: entities
        title: Audible alerts
        show_header_toggle: false
        entities:
          - entity: input_boolean.lightning_audible_enabled
            name: Audible enabled
          - entity: input_number.lightning_audible_radius_mi
            name: Audible radius (mi)
          - entity: input_number.lightning_visual_radius_mi
            name: Visual radius (mi)
          - entity: input_number.lightning_realert_cooldown_min
            name: Re-alert cooldown (min)
          - entity: input_number.alert_volume
            name: Alert volume
          - entity: input_boolean.quiet_hours
            name: Quiet hours

  - type: grid
    column_span: 1
    cards:
      - type: entities
        title: Dashboard behavior
        show_header_toggle: false
        entities:
          - entity: input_boolean.alert_auto_switch_enabled
            name: Auto-switch on alerts
          - entity: input_number.alert_auto_switch_hold_min
            name: Hold time (min)

      - type: markdown
        title: Theme troubleshooting
        content: |
          **Recommended:** the easiest way to control the iPad's theme is in /profile
          (avatar lower-left). Set Theme = **Casa Cola Creek Light** with mode **Auto**,
          and the dashboard will follow the iPad's day/night system setting.

          The Light/Dark/Auto buttons here override the per-user theme just for THIS
          iPad — useful for quick swaps without touching profile settings. If they
          don't work, go to **Settings → Browser Mod** and confirm this tablet is
          listed with **Register** toggle ON.

      - type: button
        name: Test chime
        icon: mdi:bell-ring
        tap_action:
          action: call-service
          service: persistent_notification.create
          service_data:
            title: Chime test
            message: Audio target not configured yet — lands with Sonos / Fully Kiosk.
