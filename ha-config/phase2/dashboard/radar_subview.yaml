# Radar subview — full-screen radar, navigated to from Weather tab.
#
# subview: true tells HA this view is reached via navigate action, not via
# the tab bar. HA automatically shows a back-arrow header that returns to the
# previous view.

title: Radar
path: radar
icon: mdi:radar
subview: true
type: panel
cards:
