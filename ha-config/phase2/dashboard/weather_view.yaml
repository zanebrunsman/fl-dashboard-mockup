# Weather tab — Phase 2.6 grid (iPad 1194x834 landscape).
#
# Changes vs 2.5:
#   - Radar moved from full-width row to LEFT column, taller aspect (col 1, ~110%)
#   - Lightning rings card REMOVED (user request)
#   - AQI + UV values merged INTO Current conditions entities card
#   - Separate iOS-style UV chart (green->yellow->orange->red gradient fill)
#   - Separate AQI chart with EPA color band gradient
#   - Tide chart data_generator fixed (parses `predictions` list of {t,v})
#   - Windy hourly forecast iframe stays in right column
#
# Layout:
#   left col  (radar tall):  [Radar (110% aspect)]
#   right col stacked:       [Current conditions w/ AQI+UV]
#                            [UV chart - iOS gradient]
#                            [AQI chart - EPA bands]
#                            [Hourly forecast iframe]
#   full width:              [Tide forecast 48h]

title: Weather
path: weather
icon: mdi:weather-partly-cloudy
type: sections
max_columns: 2
subview: false
sections:
  - type: grid
    column_span: 1
    cards:
      - type: iframe
        url: https://embed.windy.com/embed2.html?lat=29.9&lon=-81.31&detailLat=29.9&detailLon=-81.31&zoom=8&level=surface&overlay=radar&product=radar&menu=&message=true&marker=true&calendar=now&pressure=&type=map&location=coordinates&metricWind=mph&metricTemp=%C2%B0F&radarRange=-1
        aspect_ratio: '180%'
        title: Radar
        disable_sandbox: true
        allow: fullscreen; geolocation

  - type: grid
    column_span: 1
    cards:
      - type: entities
        title: Current conditions
        show_header_toggle: false
        entities:
          - entity: weather.casa_cola_creek
            name: Conditions
          - entity: sensor.aqi_current
            name: AQI
            icon: mdi:weather-hazy
          - entity: sensor.uv_index_current
            name: UV index
            icon: mdi:weather-sunny
          - entity: sensor.tide_predictions_48h
            name: Tide
          - entity: sensor.lightning_nearest_strike_display
            name: Nearest strike
          - entity: sensor.lightning_strike_bearing_display
            name: Strike bearing
          - entity: sensor.lightning_strikes_last_hour_display
            name: Strikes (last hr)

      # iOS-style UV chart with gradient fill (green -> yellow -> orange -> red -> purple)
      - type: custom:apexcharts-card
        header:
          title: UV index — next 24h
          show: true
          show_states: false
        graph_span: 24h
        span:
          start: hour
        apex_config:
          chart:
            height: 180
          grid:
            borderColor: '#374151'
          stroke:
            curve: smooth
            width: 2
          fill:
            type: gradient
            gradient:
              type: vertical
              shadeIntensity: 1
              opacityFrom: 0.85
              opacityTo: 0.25
              colorStops:
                - offset: 0
                  color: '#8b5cf6'   # 11+ extreme
                  opacity: 0.9
                - offset: 18
                  color: '#ef4444'   # 8-10 very high
                  opacity: 0.85
                - offset: 36
                  color: '#f97316'   # 6-7 high
                  opacity: 0.8
                - offset: 55
                  color: '#facc15'   # 3-5 moderate
                  opacity: 0.75
                - offset: 80
                  color: '#22c55e'   # 0-2 low
                  opacity: 0.6
          dataLabels:
            enabled: false
          xaxis:
            labels:
              format: ha
        yaxis:
          - min: 0
            max: 12
            decimals: 0
        series:
          - entity: sensor.uv_index_current
            name: UV
            type: area
            stroke_width: 2
            color: '#a855f7'
            data_generator: |
              const t = entity.attributes.time || [];
              const v = entity.attributes.uv_index || [];
              return t.map((s, i) => [new Date(s).getTime(), v[i]]);

      # AQI chart with EPA color band gradient
      - type: custom:apexcharts-card
        header:
          title: Air quality (US AQI) — next 24h
          show: true
          show_states: false
        graph_span: 24h
        span:
          start: hour
        apex_config:
          chart:
            height: 180
          grid:
            borderColor: '#374151'
          stroke:
            curve: smooth
            width: 2
          fill:
            type: gradient
            gradient:
              type: vertical
              shadeIntensity: 1
              opacityFrom: 0.85
              opacityTo: 0.25
              colorStops:
                - offset: 0
                  color: '#7e22ce'   # 200+ very unhealthy/hazardous
                  opacity: 0.9
                - offset: 25
                  color: '#ef4444'   # 151-200 unhealthy
                  opacity: 0.85
                - offset: 50
                  color: '#f97316'   # 101-150 USG
                  opacity: 0.8
                - offset: 75
                  color: '#facc15'   # 51-100 moderate
                  opacity: 0.75
                - offset: 100
                  color: '#22c55e'   # 0-50 good
                  opacity: 0.6
          dataLabels:
            enabled: false
          xaxis:
            labels:
              format: ha
        yaxis:
          - min: 0
            max: 200
            decimals: 0
        series:
          - entity: sensor.aqi_current
            name: AQI
            type: area
            stroke_width: 2
            color: '#f59e0b'
            data_generator: |
              const t = entity.attributes.time || [];
              const v = entity.attributes.us_aqi || [];
              return t.map((s, i) => [new Date(s).getTime(), v[i]]);

      - type: iframe
        url: https://embed.windy.com/embed2.html?lat=29.9&lon=-81.31&detailLat=29.9&detailLon=-81.31&zoom=8&level=surface&overlay=wind&product=ecmwf&menu=&message=true&marker=true&calendar=now&pressure=&type=forecast&location=coordinates&metricWind=mph&metricTemp=%C2%B0F&radarRange=-1
        aspect_ratio: '75%'
        title: Hourly forecast
        disable_sandbox: true
        allow: fullscreen; geolocation

  - type: grid
    column_span: 2
    cards:
      - type: custom:apexcharts-card
        header:
          title: Tide forecast — 48h
          show: true
        graph_span: 48h
        span:
          start: hour
        apex_config:
          grid:
            borderColor: '#374151'
          stroke:
            curve: smooth
            width: 2
        series:
          - entity: sensor.tide_predictions_48h
            name: Tide (ft MLLW)
            color: '#38bdf8'
            type: area
            data_generator: |
              const preds = entity.attributes.predictions || [];
              return preds.map(p => [new Date(p.t).getTime(), parseFloat(p.v)]);
