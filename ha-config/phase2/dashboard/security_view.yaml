# Security tab — Phase 2.6.1
# Fixes from screenshots:
#   - YouTube Error 153 -> switch from iframe card to custom:youtube-video-card
#     (HACS card sets referrerpolicy="strict-origin-when-cross-origin" which
#     YouTube's player now requires).
#   - FL511 embed was cluttered -> replaced with link-out + Windy I-95 highway cams
#     (Windy hosts FDOT cams natively, no auth, no banners).
#
# REQUIRED HACS install (if not already): "YouTube Video Card" by loryanstrant
#   HACS -> Frontend -> + Explore & Download Repositories -> "YouTube Video Card"

title: Security
path: security
icon: mdi:cctv
type: sections
max_columns: 2
subview: false
sections:
  - type: grid
    column_span: 2
    cards:
      - type: heading
        heading: St. Augustine live cams
        heading_style: title

  - type: grid
    column_span: 1
    cards:
      - type: custom:youtube-video-card
        video_id: ZTk5cIbXH2g
        title: St. Augustine skyline
        autoplay: true
        mute: true
        controls: true

      - type: custom:youtube-video-card
        video_id: FyGb2TZB344
        title: Castillo de San Marcos
        autoplay: true
        mute: true
        controls: true

