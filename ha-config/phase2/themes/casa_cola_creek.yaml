  paper-item-icon-color: "#8a98a8"
  paper-item-icon-active-color: "#5da8c9"

  # Switch / slider
  switch-checked-color: "#5da8c9"
  switch-checked-track-color: "#1c3a48"
  switch-unchecked-color: "#5b6776"
