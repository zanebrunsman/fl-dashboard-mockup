  # Mushroom card overrides
  mush-rgb-primary: "93, 168, 201"
  mush-card-primary-font-size: "1.0625rem"
  mush-card-secondary-font-size: "0.9375rem"
  mush-icon-border-radius: "12px"
  mush-control-border-radius: "12px"
