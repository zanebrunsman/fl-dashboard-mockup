# why: User-facing theme toggle. Persists across HA restarts via input_select
# state. Light/Dark force the Casa Cola Creek mockup palette; Auto delegates
# to HA's Backend-selected pseudo-theme (follows browser/OS color-scheme).
#
# Themes themselves must be loaded by /config/configuration.yaml — see the
# `frontend: themes:` block there.

input_select:
  theme_mode:
    name: Theme
    icon: mdi:theme-light-dark
    options:
      - Auto
      - Light
      - Dark
    initial: Auto

automation:
  - id: theme_mode_apply
    alias: "Theme: apply mode change"
    description: "Apply the selected theme when input_select.theme_mode changes"
    mode: restart
    triggers:
      - platform: state
        entity_id: input_select.theme_mode
      - platform: homeassistant
        event: start
    actions:
      - service: frontend.set_theme
        data:
          name: >-
            {% set m = states('input_select.theme_mode') %}
            {% if m == 'Dark' %}Casa Cola Creek Dark
            {% elif m == 'Light' %}Casa Cola Creek Light
            {% else %}Backend-selected
            {% endif %}
