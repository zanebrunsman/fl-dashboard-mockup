# why: User-facing theme toggle. Persists across HA restarts via input_select
# state. Auto follows browser/OS color-scheme via HA's Backend-selected pseudo-theme.
# Light/Dark force the Graphite palettes (installed via HACS).

input_select:
  theme_mode:
    name: Theme
    icon: mdi:theme-light-dark
    options:
      - Auto
      - Light
      - Dark
    initial: Auto

automation:
  - id: theme_mode_apply
    alias: "Theme: apply mode change"
    description: "Apply the selected theme when input_select.theme_mode changes"
    mode: restart
    triggers:
      - platform: state
        entity_id: input_select.theme_mode
      - platform: homeassistant
        event: start
    actions:
      # why: Graphite ships separate Light + Dark theme files. Backend-selected
      # delegates to HA's color-scheme detection (which Graphite Auto also handles).
      - service: frontend.set_theme
        data:
          name: >-
            {% set m = states('input_select.theme_mode') %}
            {% if m == 'Dark' %}Graphite
            {% elif m == 'Light' %}Graphite Light
            {% else %}Graphite Auto
            {% endif %}
