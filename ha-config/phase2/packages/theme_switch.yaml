# Theme switcher v2 — uses browser_mod to bypass per-user theme override.
#
# Background: HA's per-user "Theme" setting in /profile takes precedence over
# `frontend.set_theme`. The previous global automation didn't actually swap
# the running browser's theme because the per-user override won.
#
# Fix: target the CURRENT BROWSER directly via browser_mod.set_theme. This
# applies the theme to that specific browser session regardless of per-user
# settings. We still call frontend.set_theme as a fallback for any session
# that has "Backend-selected" as the per-user theme.
#
# After installing this package:
#   1. Reload "YAML configuration" (Settings -> Developer tools -> YAML)
#   2. Open /lovelace-fl/settings and use the Theme mode dropdown
#   3. (Optional) Set per-user Theme = "Auto" in /profile so system Light/Dark wins

input_select:
  theme_mode:
    name: Theme mode
    options:
      - Auto
      - Light
      - Dark
    initial: Auto
    icon: mdi:theme-light-dark

automation:
  - alias: Theme - apply selection to current browser (browser_mod)
    id: theme_apply_browser_mod
    mode: restart
    trigger:
      - platform: state
        entity_id: input_select.theme_mode
    action:
      - variables:
          mode: '{{ states("input_select.theme_mode") }}'
          theme_name: >
            {% if mode == 'Dark' %}Casa Cola Creek Dark
            {% elif mode == 'Light' %}Casa Cola Creek Light
            {% else %}Casa Cola Creek Light{% endif %}
      # Per-browser theme via browser_mod — bypasses per-user override
      - service: browser_mod.set_theme
        data:
          theme: "{{ theme_name }}"
        continue_on_error: true
      # Global fallback for any backend-selected sessions
      - service: frontend.set_theme
        data:
          name: "{{ theme_name }}"
          mode: |
            {% if mode == 'Auto' %}light{% else %}{{ mode | lower }}{% endif %}
        continue_on_error: true
      - service: frontend.set_theme
        data:
          name: Casa Cola Creek Dark
          mode: dark
        continue_on_error: true

  - alias: Theme - set system default on startup
    id: theme_default_startup
    trigger:
      - platform: homeassistant
        event: start
    action:
      - delay: '00:00:05'
      - service: frontend.set_theme
        data:
          name: Casa Cola Creek Light
          mode: light
        continue_on_error: true
      - service: frontend.set_theme
        data:
          name: Casa Cola Creek Dark
          mode: dark
        continue_on_error: true
