title: Casa Cola Creek
views:
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    sections:
      - type: grid
        cards:
          - type: weather-forecast
            entity: weather.casa_cola_creek
            forecast_type: hourly
            show_current: true
            show_forecast: true
            name: Casa Cola Creek

          - type: entities
            title: Now
            entities:
              - entity: weather.casa_cola_creek
                name: Conditions
              - entity: sensor.st_augustine_beach_tides_tide_predictions
                name: Tide
              - entity: sensor.weatheralerts_northeast_coastal_st_johns_flz233_flc109
                name: Active alerts
              - entity: sensor.home_lightning_distance
                name: Nearest strike
              - entity: sensor.home_lightning_counter
                name: Strikes (last hr)

          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.weatheralerts_northeast_coastal_st_johns_flz233_flc109
                above: 0
            card:
              type: markdown
              content: |
                ## Active alert
                {{ state_attr('sensor.weatheralerts_northeast_coastal_st_johns_flz233_flc109', 'alerts')[0].event }}
                {{ state_attr('sensor.weatheralerts_northeast_coastal_st_johns_flz233_flc109', 'alerts')[0].headline }}

          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.home_lightning_distance
                below: 30
            card:
              type: markdown
              content: |
                ## ⚡ Lightning nearby
                Nearest strike: {{ states('sensor.home_lightning_distance') }} mi · bearing {{ states('sensor.home_lightning_azimuth') }}°
                Strikes in last hour: {{ states('sensor.home_lightning_counter') }}
  - title: Weather
    path: weather
    icon: mdi:weather-partly-rainy
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:weather-radar-card
            zoom_level: 9
            center_latitude: 29.90
            center_longitude: -81.31
            frame_count: 10

          - type: entities
            title: Current conditions
            entities:
              - entity: weather.casa_cola_creek
                name: Conditions
              - entity: sensor.st_augustine_beach_tides_tide_predictions
                name: Tide
              - entity: sensor.home_lightning_distance
                name: Nearest strike
              - entity: sensor.home_lightning_azimuth
                name: Strike bearing
              - entity: sensor.home_lightning_counter
                name: Strikes (last hr)

          - type: weather-forecast
            entity: weather.casa_cola_creek
            forecast_type: daily
            name: 4-day outlook

          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.weatheralerts_northeast_coastal_st_johns_flz233_flc109
                above: 0
            card:
              type: markdown
              title: Active alerts
              content: |
                {% for a in state_attr('sensor.weatheralerts_northeast_coastal_st_johns_flz233_flc109', 'alerts') %}
                ### {{ a.event }}
                **{{ a.headline }}**

                {{ a.description }}
                ---
                {% endfor %}
  - title: Settings
    path: settings
    icon: mdi:cog
    type: sections
    sections:
      - type: grid
        cards:
          - type: entities
            title: Audible alerts
            entities:
              - entity: input_boolean.lightning_audible_enabled
              - entity: input_number.lightning_audible_radius_mi
              - entity: input_number.lightning_visual_radius_mi
              - entity: input_number.lightning_realert_cooldown_min
              - entity: input_number.alert_volume
              - entity: input_boolean.quiet_hours

          - type: entities
            title: Dashboard behavior
            entities:
              - entity: input_boolean.alert_auto_switch_enabled
              - entity: input_number.alert_auto_switch_hold_min

          - type: button
            name: Test chime
            icon: mdi:bell-ring
            tap_action:
              action: call-service
              service: persistent_notification.create
              service_data:
                title: Chime test
                message: "Audio target not configured yet — lands with Sonos / Fully Kiosk."
